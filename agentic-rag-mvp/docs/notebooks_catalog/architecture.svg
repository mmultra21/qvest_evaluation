<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#333" />
    </marker>
    <style>
      .box { fill:#f7f7f9; stroke:#333; stroke-width:1.2px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#111; }
      .small { font-size:12px; fill:#333; }
    </style>
  </defs>

  <!-- Planner -->
  <rect x="40" y="40" width="220" height="80" rx="8" class="box" />
  <text x="150" y="72" text-anchor="middle" class="label">Planner / Agent</text>
  <text x="150" y="92" text-anchor="middle" class="small">observes data → writes audit_logs</text>

  <!-- Audit DB -->
  <rect x="360" y="30" width="260" height="110" rx="8" class="box" />
  <text x="490" y="66" text-anchor="middle" class="label">SQLite audit_logs</text>
  <text x="490" y="86" text-anchor="middle" class="small">pending_approval → approved → executed</text>

  <!-- Admin UI -->
  <rect x="740" y="40" width="220" height="80" rx="8" class="box" />
  <text x="850" y="72" text-anchor="middle" class="label">Admin UI (Gradio)</text>
  <text x="850" y="92" text-anchor="middle" class="small">human-in-the-loop review</text>

  <!-- Executor -->
  <rect x="360" y="230" width="220" height="80" rx="8" class="box" />
  <text x="470" y="262" text-anchor="middle" class="label">Executor Worker</text>
  <text x="470" y="282" text-anchor="middle" class="small">claims approved rows → executes</text>

  <!-- Arrows -->
  <path d="M260,80 L360,80" stroke="#333" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M620,80 L740,80" stroke="#333" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M480,140 L480,230" stroke="#333" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M760,120 L760,230" stroke="#777" stroke-dasharray="6 4" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- Side-effects -->
  <rect x="640" y="320" width="300" height="70" rx="8" class="box" />
  <text x="790" y="354" text-anchor="middle" class="label">Side-effects (simulated)</text>
  <text x="790" y="374" text-anchor="middle" class="small">emails / logs / external APIs</text>
  <path d="M580,270 L640,350" stroke="#333" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="20" y="410" class="small">Architecture diagram: local-demo. Audit DB is the single source of truth; Admin UI prevents unapproved side-effects.</text>
</svg>